name: Paper Trading Bot

on:
  schedule:
    # Toutes les 15 minutes (minimum GitHub Actions = 5min)
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Necessaire pour commiter paper_state.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer le bot
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Sauvegarder l etat (commit auto)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_state.json paper_journal.csv || true
          git diff --staged --quiet || git commit -m "Update state $(date -u '+%Y-%m-%d %H:%M')"
          git push
